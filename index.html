<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brain.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="Brain-Upp — organize your notes, studies, and research" />
    <link rel="manifest" href="/manifest.json" />
    <title>Brain-Upp</title>
    <script>
      try {
        const t = JSON.parse(localStorage.getItem('brain-upp-theme') || '{}')
        if (t.state?.theme === 'dark') document.documentElement.classList.add('dark')
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
